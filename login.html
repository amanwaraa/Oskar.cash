.plan-chip{display:inline-flex;align-items:center;gap:6px;background:var(--soft);color:var(--primary);border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:900}
.plan-usage-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.plan-meter{background:linear-gradient(180deg,#fff,var(--soft));border:1px solid var(--line);border-radius:18px;padding:12px}
.plan-meter-head{display:flex;justify-content:space-between;gap:8px;align-items:center;font-weight:900;margin-bottom:8px}
.plan-meter-head small{color:var(--muted);font-weight:900}
.plan-track{height:14px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.plan-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,var(--primary));width:0%}
.plan-meter.over .plan-fill{background:linear-gradient(90deg,#ef4444,#b91c1c)}
.plan-meter-foot{display:flex;justify-content:space-between;margin-top:7px;color:var(--muted);font-weight:800;font-size:12px}
.invoice-paging-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:12px!important}
@media(max-width:680px){.plan-usage-grid{grid-template-columns:1fr}.plan-meter{padding:10px}}

const fullPermissions=Object.fromEntries(permissionCatalog.map(k=>[k,true]));

async function sha256(message){
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const bytes = typeof TextEncoder!=='undefined' ? Array.from(new TextEncoder().encode(String(message))) : Array.from(unescape(encodeURIComponent(String(message)))).map(c=>c.charCodeAt(0));
  const bitLen = bytes.length * 8; bytes.push(0x80); while(bytes.length % 64 !== 56) bytes.push(0);
  const hi = Math.floor(bitLen / 0x100000000), lo = bitLen >>> 0;
  bytes.push((hi>>>24)&255,(hi>>>16)&255,(hi>>>8)&255,hi&255,(lo>>>24)&255,(lo>>>16)&255,(lo>>>8)&255,lo&255);
  const rotr=(x,n)=>(x>>>n)|(x<<(32-n));
  for(let i=0;i<bytes.length;i+=64){
    const w=new Array(64);
    for(let t=0;t<16;t++){const j=i+t*4; w[t]=((bytes[j]<<24)|(bytes[j+1]<<16)|(bytes[j+2]<<8)|bytes[j+3])>>>0;}
    for(let t=16;t<64;t++){const s0=rotr(w[t-15],7)^rotr(w[t-15],18)^(w[t-15]>>>3); const s1=rotr(w[t-2],17)^rotr(w[t-2],19)^(w[t-2]>>>10); w[t]=(w[t-16]+s0+w[t-7]+s1)>>>0;}
    let [a,b,c,d,e,f,g,h]=H;
    for(let t=0;t<64;t++){const S1=rotr(e,6)^rotr(e,11)^rotr(e,25); const ch=(e&f)^(~e&g); const temp1=(h+S1+ch+K[t]+w[t])>>>0; const S0=rotr(a,2)^rotr(a,13)^rotr(a,22); const maj=(a&b)^(a&c)^(b&c); const temp2=(S0+maj)>>>0; h=g; g=f; f=e; e=(d+temp1)>>>0; d=c; c=b; b=a; a=(temp1+temp2)>>>0;}
    H=[(H[0]+a)>>>0,(H[1]+b)>>>0,(H[2]+c)>>>0,(H[3]+d)>>>0,(H[4]+e)>>>0,(H[5]+f)>>>0,(H[6]+g)>>>0,(H[7]+h)>>>0];
  }
  return H.map(x=>x.toString(16).padStart(8,'0')).join('');
}

function makeDbCandidates(){
  const id=firebaseConfig.projectId||'neww-d5b25';
  const saved=localStorage.getItem('oscarDbUrl_'+id);
  const list=[saved,firebaseConfig.databaseURL,`https://${id}-default-rtdb.firebaseio.com`,`https://${id}.firebaseio.com`,`https://${id}-default-rtdb.firebasedatabase.app`,`https://${id}-default-rtdb.us-central1.firebasedatabase.app`,`https://${id}-default-rtdb.europe-west1.firebasedatabase.app`,`https://${id}-default-rtdb.asia-southeast1.firebasedatabase.app`,`https://${id}-default-rtdb.asia-east1.firebasedatabase.app`,`https://${id}-default-rtdb.asia-northeast1.firebasedatabase.app`,`https://${id}-default-rtdb.australia-southeast1.firebasedatabase.app`,`https://${id}-default-rtdb.southamerica-east1.firebasedatabase.app`];
  return [...new Set(list.filter(Boolean).map(x=>String(x).replace(/\/+$/,'')))];
}
function safePathPart(v){return String(v||'').trim().replace(/[.#$\[\]/]/g,'_')}
function localCompanyStoreKey(companyKey){return `oscarStoreV2__company__${encodeURIComponent(String(companyKey||'COMPANY001').trim())}`}
function legacyCompanyStoreKey(companyKey){return 'oscarStoreV2_'+String(companyKey||'COMPANY001').trim()}
function readLocalCompanyStore(companyKey){
  const keys=[localCompanyStoreKey(companyKey), legacyCompanyStoreKey(companyKey)];
  if(String(companyKey)==='COMPANY001') keys.push('oscarStoreV2','oscarStoreV2_COMPANY001');
  for(const k of [...new Set(keys)]){
    try{const raw=localStorage.getItem(k); if(!raw) continue; const val=JSON.parse(raw); if(val && typeof val==='object') return val;}catch(e){}
  }
  return null;
}
function rawRtdbUrl(base,path){base=String(base||'').replace(/\/+$/,''); return base+'/'+String(path).split('/').map(x=>encodeURIComponent(safePathPart(x))).join('/')+'.json'}
function rtdbUrl(path){return rawRtdbUrl(firebaseConfig.databaseURL,path)}
async function fetchTimeout(url, opts={}, ms=8000){const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),ms); try{return await fetch(url,{...opts,signal:ctrl.signal,cache:'no-store',mode:'cors'})} finally{clearTimeout(timer)}}
async function pickDatabaseURL(companyKey){
  if(!navigator.onLine || !firebaseConfig.projectId) return false;
  let last='';
  for(const base of makeDbCandidates()){
    try{
      // اختبار الاتصال ممنوع أن يكتب داخل companies/{key} حتى لا ينشئ شركة وهمية.
      const probePath=`__login_probe__/${safePathPart(companyKey||'manual')}`;
      const r=await fetchTimeout(rawRtdbUrl(base,probePath),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ok:true,ts:Date.now(),from:'oscar-login-strict'})},6500);
      if(r.ok){firebaseConfig.databaseURL=base; localStorage.setItem('oscarDbUrl_'+firebaseConfig.projectId,base); return true;}
      last=String(r.status)+' '+(await r.text()).slice(0,80);
    }catch(e){last=e?.name==='AbortError'?'انتهت مهلة الاتصال':(e?.message||String(e));}
  }
  console.warn('Realtime Database URL not found/write denied', last);
  return false;
}
async function rtdbGet(path, ms=8000){const r=await fetchTimeout(rtdbUrl(path),{},ms); if(!r.ok) throw new Error('RTDB GET '+r.status); return await r.json()}
async function rtdbPatch(path,data,ms=8000){const r=await fetchTimeout(rtdbUrl(path),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)},ms); if(!r.ok) throw new Error('RTDB PATCH '+r.status); return await r.json()}
function normalizeAdmin(admin){
  if(!admin) return null;
  if(admin.main) return admin.main;
  if(admin.username || admin.passwordHash) return admin;
  return null;
}
function rowsFromObject(val){ if(!val) return []; if(Array.isArray(val)) return val.filter(Boolean).map(x=>({id:x.id,...x})); return Object.entries(val).map(([id,data])=>({id,...(data||{})})); }
function isRealCompanyRecord(c){
  if(!c || typeof c!=='object') return false;
  const admin=normalizeAdmin(c.admin);
  const hasAdmin=!!(admin && String(admin.username||'').trim() && hasUsableSecret(admin));
  const hasEmployees=!!(c.employees && Object.keys(c.employees||{}).length);
  const hasIdentity=!!(c.companyName || c.storeName || c.accessKey || c.companyKey || c.createdAt || c.updatedAt);
  return hasIdentity && (hasAdmin || hasEmployees);
}
async function isTrustedLocalCompany(c, companyKey){
  if(!c || typeof c!=='object') return false;
  const admin=normalizeAdmin(c.admin);
  const hasAdmin=!!(admin && String(admin.username||'').trim() && hasUsableSecret(admin));
  const hasIdentity=!!(c.companyName || c.storeName || c.accessKey || c.companyKey || c.createdAt || c.updatedAt || c._fromCloud);
  if(!(hasIdentity && hasAdmin)) return false;
  // ارفض القيم الافتراضية القديمة التي كانت تسمح لأي مفتاح بالدخول admin / 123456.
  const defaultSalt=companyKey+'_admin_salt';
  if(admin.username==='admin' && admin.passwordSalt===defaultSalt && admin.passwordHash===await sha256('123456'+defaultSalt) && !c.companyName && !c.storeName && !c.createdAt && !c.updatedAt){
    return false;
  }
  return true;
}
async function getLocalCompany(companyKey){let c=null; try{c=JSON.parse(localStorage.getItem('oscarCompany_'+companyKey))}catch(e){} return (await isTrustedLocalCompany(c,companyKey)) ? c : null;}

async function verifySecret(record, pass){
  if(!record) return false;
  if(record.passwordHash && record.passwordSalt){ return await sha256(pass+record.passwordSalt) === record.passwordHash; }
  if(record.passwordHash){ return (await sha256(pass)) === record.passwordHash || String(record.passwordHash)===String(pass); }
  const plain = record.password ?? record.pass ?? record.adminPassword ?? record.plainPassword;
  return plain !== undefined && String(plain) === String(pass);
}
function hasUsableSecret(record){
  return !!(record && (record.passwordHash || record.password || record.pass || record.adminPassword || record.plainPassword));
}
async function upgradePlainSecretIfNeeded(companyKey, admin, pass){
  if(!admin || (admin.passwordHash && admin.passwordSalt) || !navigator.onLine) return admin;
  if(!(await verifySecret(admin, pass))) return admin;
  const salt=admin.passwordSalt || (companyKey+'_admin_'+Date.now());
  const upgraded={...admin,passwordSalt:salt,passwordHash:await sha256(pass+salt),updatedAt:Date.now()};
  delete upgraded.password; delete upgraded.pass; delete upgraded.adminPassword; delete upgraded.plainPassword;
  try{ await rtdbPatch(`companies/${safePathPart(companyKey)}`,{admin:{main:upgraded},updatedAt:Date.now()},8000); }catch(e){ console.warn('admin password upgrade skipped',e); }
  return upgraded;
}
async function rtdbPatch(path,data,ms=9000){const r=await fetchTimeout(rtdbUrl(path),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)},ms); if(!r.ok) throw new Error('PATCH '+r.status); return await r.json()}

const LOGIN_PLAN_DEFS={
  bronze:{id:'bronze',name:'الخطة البرونزية',price:'',daily:{invoices:10,customers:10,expenses:10},fixed:{products:5,suppliers:2,accounts:4,employees:2}},
  silver:{id:'silver',name:'الخطة الفضية',price:'',daily:{invoices:50,customers:50,expenses:50},fixed:{products:25,suppliers:10,accounts:6,employees:3}},
  gold:{id:'gold',name:'الخطة الذهبية',price:'',daily:{invoices:250,customers:250,expenses:250},fixed:{products:125,suppliers:50,accounts:10,employees:5}},
  platinum:{id:'platinum',name:'الخطة البلاتينية',price:'',daily:{invoices:1000,customers:1000,expenses:1000},fixed:{products:500,suppliers:250,accounts:20,employees:10}},
  diamond:{id:'diamond',name:'الخطة الماسية',price:'',daily:{invoices:Infinity,customers:Infinity,expenses:Infinity},fixed:{products:Infinity,suppliers:Infinity,accounts:Infinity,employees:Infinity}}
};
function loginPlanObject(id){return LOGIN_PLAN_DEFS[id]||LOGIN_PLAN_DEFS.diamond;}
async function fetchCloudCompany(companyKey){
  if(!navigator.onLine) return {status:'offline',company:null};
  const readErr=Symbol('readErr');
  const safeRead=async(path,timeout=4500)=>{
    try{return {ok:true,value:await rtdbGet(path,timeout)}}
    catch(e){return {ok:false,value:readErr,error:e}}
  };
  try{
    const ok=await pickDatabaseURL(companyKey);
    if(!ok) return {status:'db-error',company:null};

    const base=`companies/${safePathPart(companyKey)}`;
    const [adminRes, employeesRes, activeRes, subscriptionEndRes, expiresAtRes, durationUnitRes, durationCountRes, planIdRes, planRes, deletedAtRes, companyNameRes, storeNameRes, updatedAtRes, createdAtRes, keyProbeRes] = await Promise.all([
      safeRead(`${base}/admin`,4500),
      safeRead(`${base}/employees`,4500),
      safeRead(`${base}/active`,3500),
      safeRead(`${base}/subscriptionEnd`,3500),
      safeRead(`${base}/expiresAt`,3500),
      safeRead(`${base}/durationUnit`,3500),
      safeRead(`${base}/durationCount`,3500),
      safeRead(`${base}/planId`,3500),
      safeRead(`${base}/plan`,3500),
      safeRead(`${base}/deletedAt`,3500),
      safeRead(`${base}/companyName`,3500),
      safeRead(`${base}/storeName`,3500),
      safeRead(`${base}/updatedAt`,3500),
      safeRead(`${base}/createdAt`,3500),
      safeRead(`${base}/companyKey`,3500)
    ]);

    const anyOk=[adminRes,employeesRes,activeRes,subscriptionEndRes,expiresAtRes,durationUnitRes,durationCountRes,planIdRes,planRes,deletedAtRes,companyNameRes,storeNameRes,updatedAtRes,createdAtRes,keyProbeRes].some(x=>x.ok);
    if(!anyOk) return {status:'error',company:null};

    const adminRaw=adminRes.ok?adminRes.value:null;
    const employeesRaw=employeesRes.ok?employeesRes.value:null;
    const active=activeRes.ok?activeRes.value:undefined;
    const subscriptionEnd=subscriptionEndRes.ok?subscriptionEndRes.value:undefined;
    const expiresAt=expiresAtRes.ok?expiresAtRes.value:0;
    const durationUnit=durationUnitRes.ok?durationUnitRes.value:'';
    const durationCount=durationCountRes.ok?durationCountRes.value:0;
    const planId=planIdRes.ok?(planIdRes.value||'diamond'):'diamond';
    const plan=planRes.ok?(planRes.value||loginPlanObject(planId)):loginPlanObject(planId);
    const deletedAt=deletedAtRes.ok?deletedAtRes.value:0;
    const companyName=companyNameRes.ok?(companyNameRes.value||''):'';
    const storeName=storeNameRes.ok?(storeNameRes.value||''):'';
    const updatedAt=updatedAtRes.ok?(updatedAtRes.value||0):0;
    const createdAt=createdAtRes.ok?(createdAtRes.value||0):0;
    const keyProbe=keyProbeRes.ok?keyProbeRes.value:undefined;

    const remoteMissing=keyProbeRes.ok && keyProbe===null && adminRes.ok && adminRaw===null && employeesRes.ok && employeesRaw===null && activeRes.ok && (active===null || active===undefined) && subscriptionEndRes.ok && (subscriptionEnd===null || subscriptionEnd===undefined) && !companyName && !storeName;
    if(remoteMissing) return {status:'missing',company:null};

    const adminVal=normalizeAdmin(adminRaw);
    const employees=rowsFromObject(employeesRaw || {});
    const hasLoginData=!!(adminVal || employees.length);
    const hasIdentity=!!(companyName || storeName || updatedAt || createdAt || hasLoginData || active!==undefined || subscriptionEnd || Number(expiresAt||0)>0);
    if(!hasIdentity || !hasLoginData) return {status:'error',company:null};

    return {status:'ok',company:{companyKey,active:active!==false,subscriptionEnd:subscriptionEnd||'2099-12-31',expiresAt:Number(expiresAt||0),durationUnit:durationUnit||'',durationCount:Number(durationCount||0),planId,plan,deletedAt:Number(deletedAt||0),admin:adminVal,employees,_fromCloud:true,companyName:companyName||storeName||'',storeName:storeName||companyName||'',updatedAt,createdAt}};
  }catch(e){console.warn('cloud login lightweight read failed',e); return {status:'error',company:null};}
}
async function cacheCloudCompany(company){
  if(!company) return;
  if(company.employees?.length) localStorage.setItem('oscarEmployees_'+company.companyKey,JSON.stringify(company.employees));
  localStorage.setItem('oscarCompany_'+company.companyKey,JSON.stringify({companyKey:company.companyKey,companyName:company.companyName||company.storeName||'',storeName:company.storeName||company.companyName||'',active:company.active,subscriptionEnd:company.subscriptionEnd,expiresAt:Number(company.expiresAt||0),durationUnit:company.durationUnit||'',durationCount:Number(company.durationCount||0),deletedAt:Number(company.deletedAt||0),admin:company.admin,_fromCloud:true,updatedAt:Date.now()}));
}
async function login(e){
  e.preventDefault();
  const companyKey=$('#companyKey').value.trim();
  const username=$('#username').value.trim();
  const pass=$('#password').value;
  if(!companyKey) return toast('أدخل مفتاح الشركة','bad');
  if(!username||!pass) return toast('أدخل اسم المستخدم وكلمة المرور','bad');
  const btn=$('#loginBtn'); btn.disabled=true; btn.textContent='جاري الدخول...';
  try{
    const cloudResult=await fetchCloudCompany(companyKey);
    let company=null;
    if(cloudResult.status==='ok'){
      company=cloudResult.company;
      await cacheCloudCompany(company);
    }else if(navigator.onLine && cloudResult.status==='missing'){
      toast('مفتاح الشركة غير موجود أو تم حذفه','bad');
      try{localStorage.removeItem('oscarCompany_'+companyKey); localStorage.removeItem('oscarEmployees_'+companyKey);}catch(e){}
      return reset();
    }else{
      company=await getLocalCompany(companyKey);
      if(!company){
        toast(navigator.onLine?'تعذر التحقق من مفتاح الشركة':'لا توجد بيانات دخول محفوظة لهذا المفتاح بدون إنترنت','bad');
        return reset();
      }
    }
    const stopReason=expiredAccessReason(company);
    if(stopReason){ toast(stopReason,'bad'); return reset(); }
    let session=null;
    const admin=normalizeAdmin(company.admin);
    if(admin && username===String(admin.username||'').trim()){
      if(!hasUsableSecret(admin)){toast('بيانات مدير هذه الشركة غير مكتملة. أعد ضبط كلمة المرور من صفحة الأدمن','bad'); return reset();}
      if(!(await verifySecret(admin,pass))){toast('اسم المستخدم أو كلمة المرور غير صحيحة لهذا المفتاح','bad'); return reset();}
      const cleanAdmin=await upgradePlainSecretIfNeeded(companyKey, admin, pass);
      session={companyKey,userId:'admin',name:'المدير',role:'admin',permissions:fullPermissions,loginAt:Date.now()};
      const lc=(await getLocalCompany(companyKey))||{companyKey}; lc.admin={...cleanAdmin,lastLogin:Date.now()}; lc.companyName=company.companyName||lc.companyName; lc.storeName=company.storeName||lc.storeName; lc.active=company.active; lc.subscriptionEnd=company.subscriptionEnd; lc.expiresAt=Number(company.expiresAt||0); lc.durationUnit=company.durationUnit||''; lc.durationCount=Number(company.durationCount||0); lc.deletedAt=Number(company.deletedAt||0); lc._fromCloud=lc._fromCloud||company._fromCloud; localStorage.setItem('oscarCompany_'+companyKey,JSON.stringify(lc));
    }else{
      let emps=company.employees||[];
      if(!emps.length){try{emps=JSON.parse(localStorage.getItem('oscarEmployees_'+companyKey)) || readLocalCompanyStore(companyKey)?.employees || []}catch(e){emps=[]}}
      const emp=emps.find(x=>String(x.username||'')===username || String(x.id||'')===username);
      if(!emp){toast('اسم المستخدم غير موجود داخل هذا المفتاح','bad'); return reset();}
      if(emp.active===false){toast('حساب الموظف موقوف','bad'); return reset();}
      if(!hasUsableSecret(emp)){toast('كلمة مرور الموظف غير مضبوطة. عدّل الموظف وأدخل كلمة مرور','bad'); return reset();}
      if(!(await verifySecret(emp,pass))){toast('اسم المستخدم أو كلمة المرور غير صحيحة لهذا المفتاح','bad'); return reset();}
      emp.lastLogin=Date.now(); localStorage.setItem('oscarEmployees_'+companyKey,JSON.stringify(emps));
      session={companyKey,userId:emp.id,name:emp.name||emp.username,role:'employee',branchId:emp.branchId||'main',branchName:emp.branchName||'',permissions:emp.permissions||{},loginAt:Date.now()};
    }
    localStorage.setItem('oscarSession',JSON.stringify(session));
    toast('تم تسجيل الدخول');
    setTimeout(()=>location.replace('dashboard.html'),120);
  }catch(err){console.error(err); toast('تعذر تسجيل الدخول: '+(err.message||err),'bad'); reset();}
}
function reset(){const btn=$('#loginBtn'); btn.disabled=false; btn.textContent='تسجيل الدخول'}
function cachedCompanyAccess(companyKey){
  try{return JSON.parse(localStorage.getItem('oscarCompany_'+companyKey)||'null')}catch(e){return null}
}
function accessExpiryMs(c){
  const ts=Number(c?.expiresAt||0);
  if(ts>0) return ts;
  const end=String(c?.subscriptionEnd||'').trim();
  if(end && end!=='2099-12-31') return new Date(end+'T23:59:59').getTime();
  return 0;
}
function isExpiredAccess(c){
  if(!c) return false;
  if(c.active===false) return true;
  const ts=accessExpiryMs(c);
  return !!(ts && ts<Date.now());
}
function expiredAccessReason(c){
  if(c?.deletedAt) return 'تم حذف مفتاح الشركة';
  if(c?.active===false) return 'تم إيقاف مفتاح الشركة';
  const ts=accessExpiryMs(c);
  if(ts && ts<Date.now()) return 'انتهى اشتراكك';
  return '';
}
function savedSessionCanAutoEnter(s){
  const c=s?.companyKey?cachedCompanyAccess(s.companyKey):null;
  if(isExpiredAccess(c)){
    try{localStorage.setItem('oscarLoginNotice', expiredAccessReason(c)||'انتهى اشتراكك')}catch(e){}
    localStorage.removeItem('oscarSession');
    return false;
  }
  return !!(s && s.companyKey);
}
document.addEventListener('DOMContentLoaded',()=>{
  const qp=new URLSearchParams(location.search);
  const force=qp.get('logout')==='1' || qp.get('login')==='1' || qp.get('forceLogin')==='1';
  const preset=qp.get('company')||qp.get('key')||'';
  const notice=localStorage.getItem('oscarLoginNotice');
  if(notice){ localStorage.removeItem('oscarLoginNotice'); setTimeout(()=>toast(notice,'warn'),120); }
  let saved=null; try{saved=JSON.parse(localStorage.getItem('oscarSession')||'null')}catch(e){}
  if(saved && !force){
    if(savedSessionCanAutoEnter(saved)){
      location.replace('dashboard.html');
      return;
    }
    localStorage.removeItem('oscarSession');
  }
  // لا تعبئة تلقائية للحقول عند عدم وجود جلسة صالحة. الدخول التلقائي يعتمد على الجلسة فقط.
  ['companyKey','username','password'].forEach(id=>{const el=$('#'+id); if(el) el.value='';});
  if(preset && $('#companyKey')) $('#companyKey').value=preset;
  setTimeout(()=>{ if(!preset && $('#companyKey')) $('#companyKey').value=''; if($('#username')) $('#username').value=''; if($('#password')) $('#password').value=''; },80);
  $('#loginForm')?.addEventListener('submit',login);
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.warn);
});
</script></body></html>
